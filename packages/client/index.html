<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Deceive Me Daddy — client</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0c0d12; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; width: 100%; height: 100%; }
      #hint {
        position: fixed;
        left: 12px;
        bottom: 12px;
        font: 12px/1.4 ui-monospace, monospace;
        color: #aab;
        background: rgba(0, 0, 0, 0.45);
        padding: 6px 9px;
        border-radius: 6px;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hint">desktop: right-drag to look (or click to capture) · WASD move · shift run · E/Q/R/G · click/F fire — mobile: left stick move · right drag look · buttons act</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
