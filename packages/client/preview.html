<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deceive Me Daddy — map preview</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #0c0d12; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; width: 100%; height: 100%; }

      /* Harness shell CSS — lives ONLY behind the preview entry, never the game bundle. */
      .preview-panel {
        position: fixed;
        top: 12px;
        left: 12px;
        font: 12px/1.5 ui-monospace, monospace;
        color: #dde;
        background: rgba(8, 9, 14, 0.82);
        border: 1px solid #2a2f40;
        padding: 10px 12px;
        border-radius: 8px;
        user-select: none;
        min-width: 180px;
      }
      .preview-title { font-weight: 700; margin-bottom: 8px; color: #fff; }
      .preview-picker {
        width: 100%;
        background: #14161e;
        color: #dde;
        border: 1px solid #2a2f40;
        border-radius: 5px;
        padding: 4px 6px;
        font: inherit;
      }
      .preview-empty { color: #f88; }
      .preview-legend { margin-top: 10px; display: grid; gap: 4px; }
      .preview-legend-row { display: flex; align-items: center; gap: 8px; text-transform: capitalize; }
      .preview-swatch {
        width: 14px; height: 14px; border-radius: 3px; display: inline-block;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }
      .preview-hint {
        position: fixed; right: 12px; bottom: 12px;
        font: 12px/1.4 ui-monospace, monospace; color: #889;
        background: rgba(0, 0, 0, 0.45); padding: 6px 9px; border-radius: 6px;
        pointer-events: none; user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="preview-hint">drag to orbit · scroll to zoom · right-drag to pan</div>
    <script type="module" src="/src/preview/main.ts"></script>
  </body>
</html>
