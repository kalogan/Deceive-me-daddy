# fly.toml app configuration file generated for deceive-me-daddy on 2026-06-26T05:51:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'deceive-me-daddy'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
